<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bouj</title>
  <style>
    :root {
      --bg: #f5f5f0;
      --fg: #1a1a1a;
      --muted: #888;
      --toggle-bg: #ddd;
      --toggle-fg: #333;
    }

    [data-theme="dark"] {
      --bg: #111;
      --fg: #e8e8e0;
      --muted: #666;
      --toggle-bg: #333;
      --toggle-fg: #ccc;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s, color 0.3s;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    .moon-date {
      font-size: clamp(1.5rem, 5vw, 3.5rem);
      letter-spacing: 0.05em;
      margin-bottom: 0.5em;
    }

    .moon-date.gate .divider {
      margin: 0 0.3em;
    }

    .sub {
      font-size: clamp(0.75rem, 2.5vw, 1.25rem);
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .top-controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: flex-end;
    }

    .top-controls button {
      background: var(--toggle-bg);
      color: var(--toggle-fg);
      border: none;
      border-radius: 2rem;
      padding: 0.35em 0.75em;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
      user-select: none;
    }

    .top-controls button:hover {
      opacity: 0.8;
    }

    #moon-date {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }

    .term-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--fg);
      color: var(--bg);
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(0.9rem, 3vw, 1rem);
      padding: 0.75rem 1.25rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      z-index: 100;
    }

    .term-overlay.active {
      display: flex;
    }

    .term-prompt {
      opacity: 0.5;
      user-select: none;
      flex-shrink: 0;
    }

    .term-input {
      background: transparent;
      border: none;
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      flex: 1;
      outline: none;
      min-width: 0;
    }

    .term-hint {
      opacity: 0.4;
      font-size: 0.75em;
      flex-shrink: 0;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    .term-overlay.shake {
      animation: shake 0.35s ease;
    }
  </style>
</head>
<body>
  <div class="top-controls">
    <button id="theme-toggle" aria-label="Toggle light/dark mode">☀ light</button>
    <button id="lang-toggle" aria-label="Toggle Chinese">中文</button>
  </div>

  <main>
    <p class="moon-date" id="moon-date">—</p>
    <p class="sub" id="sub"></p>
  </main>

  <div class="term-overlay" id="term-overlay">
    <span class="term-prompt">&gt;</span>
    <input class="term-input" id="term-input" type="password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <span class="term-hint" id="term-hint">esc to close</span>
  </div>

  <script>
    const API = 'https://bouj-backend-production.up.railway.app';

    const moonEl = document.getElementById('moon-date');
    const subEl  = document.getElementById('sub');

    // ── language (init first — theme toggle text depends on it) ──────────────

    const langToggle = document.getElementById('lang-toggle');
    let useChinese   = localStorage.getItem('lang') === 'zh';

    updateLangToggle();

    langToggle.addEventListener('click', () => {
      useChinese = !useChinese;
      localStorage.setItem('lang', useChinese ? 'zh' : 'en');
      updateLangToggle();
      setTheme(html.dataset.theme);
      if (lastData) render(lastData);
    });

    function updateLangToggle() {
      langToggle.textContent = useChinese ? 'eng' : '中文';
    }

    // ── theme ────────────────────────────────────────────────────────────────

    const themeToggle = document.getElementById('theme-toggle');
    const html        = document.documentElement;

    setTheme(localStorage.getItem('theme') || 'dark');

    themeToggle.addEventListener('click', () => {
      setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    function setTheme(theme) {
      html.dataset.theme = theme;
      themeToggle.textContent = theme === 'dark'
        ? (useChinese ? '☾ 夜' : '☾ dark')
        : (useChinese ? '☀ 日' : '☀ light');
      localStorage.setItem('theme', theme);
    }

    const ZH_MONTHS = {
      1: '正月', 2: '二月', 3: '三月', 4: '四月',
      5: '五月', 6: '六月', 7: '七月', 8: '八月',
      9: '九月', 10: '十月', 11: '十一月', 12: '十二月',
    };

    const ZH_DAYS = [
      '', '初一', '初二', '初三', '初四', '初五',
      '初六', '初七', '初八', '初九', '初十',
      '十一', '十二', '十三', '十四', '十五',
      '十六', '十七', '十八', '十九', '二十',
      '廿一', '廿二', '廿三', '廿四', '廿五',
      '廿六', '廿七', '廿八', '廿九', '三十',
    ];

    function zhReading(month, is_leap, day) {
      return (is_leap ? '闰' : '') + ZH_MONTHS[month] + ZH_DAYS[day];
    }

    // ── moon ─────────────────────────────────────────────────────────────────

    let lastData = null;

    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('geolocation not supported'));
        } else {
          navigator.geolocation.getCurrentPosition(resolve, reject);
        }
      });
    }

    async function fetchMoon(lat, lon) {
      const res = await fetch(`${API}/moon?lat=${lat}&lon=${lon}`);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      return res.json();
    }

    function render(data) {
      const time = data.is_gate_day
        ? new Date(data.gate.new_moon_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase()
        : null;

      if (data.is_gate_day) {
        const { closing, opening } = data.gate;
        const closingText = useChinese
          ? zhReading(closing.month, closing.is_leap, closing.day)
          : closing.display;
        const openingText = useChinese
          ? zhReading(opening.month, opening.is_leap, opening.day)
          : opening.display;

        moonEl.classList.add('gate');
        moonEl.innerHTML =
          `<span class="closing">${closingText}</span>` +
          `<span class="divider">·</span>` +
          `<span class="opening">${openingText}</span>`;

        subEl.textContent = useChinese
          ? `交朔 · ${time}`
          : `gate at ${time}`;
      } else {
        moonEl.classList.remove('gate');
        moonEl.textContent = useChinese
          ? zhReading(data.reading.month, data.reading.is_leap, data.reading.day)
          : data.reading.display;
        subEl.textContent = '';
      }
    }

    function renderError(msg) {
      moonEl.textContent = '—';
      subEl.textContent = msg;
    }

    async function init() {
      subEl.textContent = useChinese ? '定位中…' : 'locating...';
      try {
        const pos  = await getLocation();
        localStorage.setItem('bouj_lat', pos.coords.latitude);
        localStorage.setItem('bouj_lon', pos.coords.longitude);
        lastData   = await fetchMoon(pos.coords.latitude, pos.coords.longitude);
        render(lastData);
      } catch (err) {
        if (err.code === 1) {
          renderError(useChinese ? '请开启定位' : 'enable location to see your moon date');
        } else {
          renderError(useChinese ? '出错了' : 'something went wrong');
        }
      }
    }

    init();

    // ── terminal prompt ───────────────────────────────────────────────────────

    const termOverlay = document.getElementById('term-overlay');
    const termInput   = document.getElementById('term-input');
    const termHint    = document.getElementById('term-hint');

    function openTerm() {
      termOverlay.classList.add('active');
      termInput.value = '';
      termInput.disabled = false;
      termHint.textContent = 'esc to close';
      termInput.focus();
    }

    function closeTerm() {
      termOverlay.classList.remove('active');
      termInput.value = '';
    }

    async function submitTerm() {
      const password = termInput.value;
      if (!password) return;

      termInput.disabled = true;
      termHint.textContent = '…';

      try {
        const res = await fetch(`${API}/auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          const { token, username } = await res.json();
          localStorage.setItem('bouj_token', token);
          localStorage.setItem('bouj_username', username);
          window.location.href = 'inner.html';
        } else {
          termOverlay.classList.add('shake');
          setTimeout(() => termOverlay.classList.remove('shake'), 350);
          termInput.value = '';
          termInput.disabled = false;
          termHint.textContent = 'try again';
          termInput.focus();
        }
      } catch {
        termInput.value = '';
        termInput.disabled = false;
        termHint.textContent = 'error — try again';
        termInput.focus();
      }
    }

    // keyboard: ? opens, Escape closes, Enter submits
    document.addEventListener('keydown', (e) => {
      if (termOverlay.classList.contains('active')) {
        if (e.key === 'Escape') closeTerm();
        if (e.key === 'Enter')  submitTerm();
      } else {
        if (e.key === '?') {
          e.preventDefault();
          openTerm();
        }
      }
    });

    // mobile: long-press on moon date opens prompt
    let _longPress = null;

    moonEl.addEventListener('touchstart', (e) => {
      _longPress = setTimeout(() => {
        _longPress = null;
        openTerm();
      }, 600);
    }, { passive: true });

    moonEl.addEventListener('touchend',  () => { clearTimeout(_longPress); _longPress = null; });
    moonEl.addEventListener('touchmove', () => { clearTimeout(_longPress); _longPress = null; });

    // prevent context menu from showing during long-press
    moonEl.addEventListener('contextmenu', (e) => e.preventDefault());

    // lift prompt above keyboard on iOS
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        const offset = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
        termOverlay.style.bottom = Math.max(0, offset) + 'px';
      });
    }
  </script>
</body>
</html>
